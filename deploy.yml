name: Deploy Invoice App
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Sheet ID into index.html
        run: |
          sed -i "s|SHEET_ID_PLACEHOLDER|${{ secrets.SHEET_ID }}|g" index.html

      - name: Inject Password Hash into login.html
        run: |
          HASH=$(echo -n "${{ secrets.ACCESS_PASSWORD }}" | sha256sum | awk '{print $1}')
          sed -i "s|PASSWORD_HASH_PLACEHOLDER|$HASH|g" login.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
